<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BrewBoxd</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="image/x-icon" href="./img/logo endereco.png">
  </head>
<body>
 <header>
     <nav class="main-nav">
    <a href="/" class="logo-link">
        <img src="img/logo.png" alt="Logo" class="logo-img">
    </a>
    <div class="nav-links">
         <a href="index.html" >Home</a>
        <a href="explorar.html">Explore Cafés</a>
        <a href="favoritos do mês.html">favoritos</a>
        <a href="login.html"class="active">Criar Conta</a>
        
    </div>
</nav>

    </header>
    
<section class="auth-layout">

    <div class="auth-card">

        <h1>Criar Conta</h1>

        <p>
            Crie sua conta para salvar cafés favoritos.
        </p>

        <form>

            <div class="input-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" required minlength="8">
            </div>

            <button class="btn">
                Criar Conta
            </button>

        </form>

    </div>

   <aside class="auth-aside cadastro-aside">

        <span class="aside-tag">
            BREWBOXD
        </span>

        <h2>
            Já possui uma conta?
        </h2>

        <p>
            Entre novamente e continue explorando cafeterias em Pelotas.
        </p>

        <a href="login.html" class="btn aside-btn">
            Fazer Login
        </a>

    </aside>

</section>
<footer class="footer">
    <p>© 2026 BrewBoxd • Projeto acadêmico</p>
</footer>
</body>
</html>
